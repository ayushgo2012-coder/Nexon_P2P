<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Chat (Firestore Only)</title>

<style>
body{margin:0;font-family:sans-serif;background:#111b21;}
.app{max-width:420px;margin:auto;height:100vh;display:flex;flex-direction:column;background:#0b141a;}

#loginScreen{display:flex;flex-direction:column;padding:20px;gap:10px;}
input,button{padding:12px;border:none;border-radius:8px;}
button{background:#25d366;}

#chatScreen{display:none;flex-direction:column;height:100%;}
.header{background:#202c33;color:white;padding:15px;}

#userList{background:#111b21;color:white;overflow:auto;}
.user{display:flex;align-items:center;padding:10px;border-bottom:1px solid #333;cursor:pointer;}
.avatar{width:35px;height:35px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;margin-right:10px;}

#messages{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;}
.bubble{max-width:70%;padding:10px;border-radius:10px;margin:5px;color:white;}
.sent{background:#005c4b;align-self:flex-end;}
.received{background:#202c33;}

.meta{font-size:10px;text-align:right;opacity:0.7;}

.inputBar{display:flex;background:#202c33;}
.inputBar input{flex:1;background:#2a3942;color:white;}
.inputBar button{margin:3px;}

#searchInput{padding:10px;border:none;width:100%;}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div id="loginScreen">
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login / Register</button>
</div>

<!-- CHAT -->
<div id="chatScreen">
  <div class="header" id="chatTitle">Chats</div>

  <input id="searchInput" placeholder="Search users...">

  <div id="userList"></div>
  <div id="messages"></div>

  <div class="inputBar">
    <input id="messageInput" placeholder="Message">
    <button id="sendBtn">Send</button>
  </div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
import {
  getFirestore, collection, addDoc, onSnapshot, query, orderBy,
  doc, setDoc, getDoc, updateDoc
} from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

/* ✅ YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCx4klVZRJHpMIwZu-3-JliOFUQTX-LFwY",
  authDomain: "nexon-p2p.firebaseapp.com",
  projectId: "nexon-p2p",
  storageBucket: "nexon-p2p.firebasestorage.app",
  messagingSenderId: "560699849111",
  appId: "1:560699849111:web:84f1f334e04c5c867c6cd2",
  measurementId: "G-F9FCDEWFZE"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const db = getFirestore(app);

/* STATE */
let currentUser = "";
let currentChatUser = "";
let allUsers = [];

/* 🔐 HASH PASSWORD */
async function hash(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* LOGIN / REGISTER */
loginBtn.onclick = async () => {
  const name = username.value.trim();
  const pass = password.value;

  if(!name || !pass) return;

  const ref = doc(db,"users",name);
  const snap = await getDoc(ref);
  const hashed = await hash(pass);

  if(!snap.exists()){
    await setDoc(ref,{ pass: hashed });
  } else {
    if(snap.data().pass !== hashed){
      alert("Wrong password");
      return;
    }
  }

  currentUser = name;

  loginScreen.style.display="none";
  chatScreen.style.display="flex";

  loadUsers();
};

/* LOAD USERS */
function loadUsers(){
  onSnapshot(collection(db,"users"), snap=>{
    allUsers = [];

    snap.forEach(d=>{
      if(d.id !== currentUser){
        allUsers.push(d.id);
      }
    });

    renderUsers(allUsers);
  });
}

/* RENDER USERS */
function renderUsers(list){
  userList.innerHTML = "";

  list.forEach(u=>{
    const div = document.createElement("div");
    div.className = "user";

    div.innerHTML = `
      <div class="avatar">${u[0]}</div>
      <div>${u}</div>
    `;

    div.onclick = ()=>{
      currentChatUser = u;
      chatTitle.innerText = u;
      loadMessages();
    };

    userList.appendChild(div);
  });
}

/* SEARCH */
searchInput.oninput = () => {
  const value = searchInput.value.toLowerCase();

  const filtered = allUsers.filter(u =>
    u.toLowerCase().includes(value)
  );

  renderUsers(filtered);
};

/* SEND MESSAGE */
sendBtn.onclick = async ()=>{
  const text = messageInput.value.trim();
  if(!text || !currentChatUser) return;

  await addDoc(collection(db,"messages"),{
    from: currentUser,
    to: currentChatUser,
    text: text,
    seen:false,
    time: Date.now()
  });

  messageInput.value="";
};

/* LOAD MESSAGES */
function loadMessages(){
  const q = query(collection(db,"messages"), orderBy("time"));

  onSnapshot(q, snap=>{
    messages.innerHTML="";

    snap.forEach(async docSnap=>{
      const m = docSnap.data();

      if(
        (m.from===currentUser && m.to===currentChatUser) ||
        (m.from===currentChatUser && m.to===currentUser)
      ){
        const div=document.createElement("div");
        div.className="bubble "+(m.from===currentUser?"sent":"received");

        div.innerHTML=`
          ${m.text}
          <div class="meta">
            ${new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}
            ${m.from===currentUser?(m.seen?" ✔✔":" ✔"):""}
          </div>
        `;

        messages.appendChild(div);

        if(m.to===currentUser && !m.seen){
          await updateDoc(docSnap.ref,{seen:true});
        }
      }
    });

    messages.scrollTop=messages.scrollHeight;
  });
}
</script>

</body>
</html>
